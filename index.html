<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container bg-white shadow-sm p-5 mt-5 text-center rounded">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKfHfYtZis-gpD09-XgVZkYql9R4sXoLhu4g&s" alt="Logo" class="mb-4">
        <h1>Login</h1>
 
            <div class="mb-3 text-start"> 
                <label for="user" class="form-label">Username</label>
                <input type="text" id="user" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="mb-3 text-start">
                <label for="pass" class="form-label">Password</label>
                <input type="password" id="pass" class="form-control" placeholder="Must be more than 5 characters" required>
            </div>

            <div class="mb-4 text-start">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="stayLogged">
                    <label class="form-check-label" for="stayLogged">Stay Signed In</label>
                </div>
                <small class="text-muted d-block mt-1">You will remain logged in unless you disable this feature.</small>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
